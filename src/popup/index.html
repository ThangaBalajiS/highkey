<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highkey</title>
    <style>
      body {
        width: 320px;
        padding: 1.25rem;
        font-family: system-ui, -apple-system, sans-serif;
        background: #121212;
        color: #fff;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 1rem 0;
        color: #00d778;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 12px;
        margin-bottom: 0.75rem;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        transition: transform 0.1s, background 0.2s;
      }
      .btn:active { transform: scale(0.98); }
      
      .btn-primary {
        background: #00d778;
        color: #000;
      }
      .btn-primary:hover { background: #00f088; }
      
      .btn-secondary {
        background: #2a2a2a;
        color: #fff;
      }
      .btn-secondary:hover { background: #3a3a3a; }
      
      p {
        font-size: 0.9rem;
        color: #aaa;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>Highkey</h1>
    <p>Bind any UI element to a key without CSS selectors.</p>
    
    <button id="start-binding" class="btn btn-primary">
      Start Binding (Target Mode)
    </button>
    
    <button id="open-dashboard" class="btn btn-secondary">
      Open Dashboard
    </button>

    <div id="current-site-section" style="display: none; margin-top: 1rem; border-top: 1px solid #333; padding-top: 1rem;">
      <div style="font-size: 0.75rem; color: #666; text-transform: uppercase; margin-bottom: 0.75rem;">Shortcuts on this site</div>
      <div id="shortcut-list"></div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
