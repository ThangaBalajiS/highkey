<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highkey Dashboard</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #0f0f0f;
      color: #e0e0e0;
      margin: 0;
      padding: 2rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { color: #fff; margin-bottom: 2rem; }
    .domain-group {
      background: #1a1a1a;
      border-radius: 12px;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 1px solid #222;
      overflow: hidden;
    }
    .domain-header {
      font-size: 1.25rem;
      font-weight: bold;
      padding: 1.25rem 1.5rem;
      color: #00d778;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    .domain-header:hover {
      background: #222;
    }
    .domain-header::after {
      content: '▼';
      font-size: 0.8rem;
      transition: transform 0.3s;
      color: #666;
    }
    .domain-group.open .domain-header::after {
      transform: rotate(180deg);
    }
    .domain-body {
      display: none;
      padding: 0 1.5rem 1.5rem 1.5rem;
      border-top: 1px solid #222;
    }
    .domain-group.open .domain-body {
      display: block;
    }

    .section-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin: 1.5rem 0 0.75rem 0;
      border-bottom: 1px solid #222;
      padding-bottom: 4px;
    }
    .route-group {
      margin-bottom: 1.5rem;
      padding-left: 1rem;
      border-left: 2px solid #333;
    }
    .route-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      background: #222;
      padding: 8px 12px;
      border-radius: 6px;
    }
    .route-path {
      font-family: monospace;
      color: #ffaa00;
      font-size: 0.9rem;
    }
    .edit-path-input {
      background: #000;
      color: #ffaa00;
      border: 1px solid #444;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
      width: 60%;
    }
    .shortcut-item {
      display: flex;
      flex-direction: column;
      padding: 0.75rem;
      background: #252525;
      margin-bottom: 0.5rem;
      border-radius: 8px;
      border: 1px solid transparent;
    }
    .shortcut-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .shortcut-info { display: flex; align-items: center; gap: 1rem; }
    .label-text {
      color: #fff;
      font-weight: 500;
    }
    
    .action-btns {
      display: flex;
      gap: 8px;
    }
    .btn-sm {
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .edit-btn {
      background: #0078d722;
      color: #0078d7;
      border-color: #0078d744;
    }
    .edit-btn:hover { background: #0078d7; color: white; }
    .delete-btn {
      background: #ff4d4d22;
      color: #ff4d4d;
      border-color: #ff4d4d44;
    }
    .delete-btn:hover { background: #ff4d4d; color: white; }
    .save-btn {
      background: #00d77822;
      color: #00d778;
      border-color: #00d77844;
    }
    .save-btn:hover { background: #00d778; color: black; }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background: #1a1a1a;
      width: 420px;
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid #333;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .modal-header {
      font-size: 1.25rem;
      font-weight: bold;
      color: #fff;
    }
    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .form-group label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      background: #000;
      color: #fff;
      border: 1px solid #333;
      padding: 10px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .form-input:focus {
      border-color: #00d778;
      outline: none;
    }
    .form-input.mono { font-family: monospace; color: #00d778; }
    .shortcut-capture {
      background: #252525;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      border: 1px dashed #444;
      font-weight: bold;
      transition: all 0.2s;
    }
    .shortcut-capture:hover { border-color: #666; }
    .shortcut-capture.active {
      border-color: #00d778;
      background: #00d77811;
      color: #00d778;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 0.5rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Highkey Shortcuts</h1>
    <div id="dashboard-content">
      <div class="empty-state">No shortcuts found. Start binding!</div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">Edit Shortcut</div>
      <div class="modal-form">
        <div class="form-group">
          <label>Label</label>
          <input type="text" id="modal-label" class="form-input">
        </div>
        <div class="form-group">
          <label>CSS Selector</label>
          <input type="text" id="modal-selector" class="form-input mono">
        </div>
        <div class="form-group">
          <label>Shortcut Key</label>
          <div id="modal-capture" class="shortcut-capture"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn-sm" style="background:#333; color:white;">Cancel</button>
        <button id="modal-save" class="btn-sm save-btn">Save Changes</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
